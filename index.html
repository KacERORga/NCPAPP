<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NCP BANK | KC-KacKoin - Переводы по ссылке и NFC</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 24px; }
        body.dark { background: linear-gradient(145deg, #0a0f1a 0%, #0f1722 100%); }
        .app-container { max-width: 700px; width: 100%; margin: 0 auto; }
        .ncp-logo { text-align: center; margin-bottom: 20px; }
        .ncp-logo h1 { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #1E2A3E, #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent; }
        body.dark .ncp-logo h1 { background: linear-gradient(135deg, #fbbf24, #3b82f6); -webkit-background-clip: text; background-clip: text; }
        .ncp-logo p { font-size: 0.7rem; color: #64748b; margin-top: 4px; }
        
        .card, .dashboard-card, .register-card, .login-card, .settings-panel {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 40px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.2);
            padding: 28px 24px 32px;
        }
        body.dark .card, body.dark .dashboard-card, body.dark .register-card,
        body.dark .login-card, body.dark .settings-panel {
            background: rgba(30, 41, 59, 0.96);
            color: #f1f5f9;
        }
        
        .input-group { margin-bottom: 18px; }
        label { font-weight: 600; font-size: 0.8rem; display: block; margin-bottom: 6px; color: #334155; }
        body.dark label { color: #cbd5e1; }
        input, select {
            width: 100%;
            padding: 12px 18px;
            border: 1.5px solid #e2e8f0;
            border-radius: 60px;
            background: white;
            outline: none;
        }
        body.dark input, body.dark select { background: #1e293b; border-color: #475569; color: #f1f5f9; }
        button {
            background: #0f1722;
            color: white;
            border: none;
            padding: 12px 20px;
            width: 100%;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
        }
        button:hover { background: #2d3a4e; transform: scale(0.98); }
        .balance { background: #f8fafc; padding: 16px 20px; border-radius: 28px; margin: 20px 0; display: flex; justify-content: space-between; align-items: center; }
        body.dark .balance { background: #334155; }
        .balance-amount { font-size: 1.8rem; font-weight: 800; color: #0f1722; }
        body.dark .balance-amount { color: #fbbf24; }
        .flex-buttons { display: flex; gap: 12px; margin-top: 12px; }
        .logout-btn { background: #475569; }
        .legal-footer { text-align: center; font-size: 0.7rem; margin-top: 20px; }
        .legal-footer a { color: #3b82f6; cursor: pointer; }
        .ncp-tag { font-size: 0.6rem; text-align: center; margin-top: 16px; color: #94a3b8; }
        .online-counter { background: rgba(255,255,255,0.9); border-radius: 60px; padding: 6px 16px; display: inline-flex; align-items: center; gap: 8px; font-size: 0.75rem; color: #10b981; margin-bottom: 16px; border: 1px solid #10b981; }
        .online-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; animation: pulse 1.5s infinite; }
        .switch-mode { text-align: center; margin-top: 16px; }
        .switch-mode a { color: #3b82f6; cursor: pointer; }
        .error-msg { background: #fee2e2; color: #b91c1c; padding: 10px; border-radius: 60px; font-size: 0.8rem; margin-top: 12px; text-align: center; }
        .success-msg { background: #dcfce7; color: #15803d; padding: 10px; border-radius: 60px; margin-top: 12px; text-align: center; }
        .nav-tab {
            background: rgba(255,255,255,0.7);
            padding: 8px 16px;
            border-radius: 60px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: 0.2s;
        }
        body.dark .nav-tab { background: rgba(0,0,0,0.4); color: #e2e8f0; }
        .nav-tab.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .nav-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        
        .transfer-section {
            background: #eef2ff;
            padding: 16px;
            border-radius: 24px;
            margin: 20px 0;
        }
        body.dark .transfer-section { background: #1e293b; }
        .transfer-title { font-weight: bold; margin-bottom: 12px; }
        
        .link-preview {
            background: #f1f5f9;
            border-radius: 16px;
            padding: 12px;
            margin-top: 12px;
            word-break: break-all;
            font-size: 0.7rem;
            font-family: monospace;
        }
        body.dark .link-preview { background: #0f1722; }
        
        .nfc-status {
            font-size: 0.9rem;
            margin: 10px 0;
            padding: 8px;
            border-radius: 60px;
            background: rgba(0,0,0,0.3);
            text-align: center;
        }
        .nfc-status.active { background: #10b981; color: white; }
        .nfc-status.error { background: #ef4444; color: white; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .copy-btn { background: #3b82f6; margin-top: 8px; }
    </style>
</head>
<body>

<div class="app-container" id="appContainer">
    <div class="ncp-logo">
        <h1>🏦 NCP BANK</h1>
        <p>Независимый Центр Решений | KC-KacKoin (-_-)</p>
    </div>
    <div id="appRoot"></div>
    <div class="ncp-tag">⚡ Решения принимаются здесь. Где здесь — неизвестно.</div>
</div>

<script>
    // ========== КЛЮЧИ ==========
    const USERS_KEY = 'ncpbank_cloud_v2';
    const SESSION_KEY = 'ncpbank_session_cloud';
    const SETTINGS_KEY = 'ncpbank_settings_cloud';
    const ONLINE_KEY = 'ncpbank_online';
    const ADMIN_PASSWORD = '6369';
    const ADMIN_NICK = 'KacERORga';
    const INFINITY_MONEY = 999999999;

    const JSONBIN_URL = 'https://api.jsonbin.io/v3/b/69db179b856a682189246d42';
    const JSONBIN_KEY = '$2a$10$2aGZ8tMwhc3EUmimZmaGYOzsVH9qQO1s7jqu1m9TwOTUSGPOmkNzW';
    let USE_CLOUD = true;
    
    let cachedUsers = null;
    let currentTab = 'dashboard';
    let showSettings = false;
    let currentView = 'login';
    let appSettings = { theme: 'light' };
    let onlineCount = 0;
    let currentUserNickname = '';
    let currentUserBalance = 0;
    
    // ========== ОБЛАЧНЫЕ ФУНКЦИИ ==========
    async function loadUsersCloud() {
        if (!USE_CLOUD) return null;
        try {
            const res = await fetch(JSONBIN_URL, { headers: { 'X-Master-Key': JSONBIN_KEY } });
            const data = await res.json();
            return data.record.users || {};
        } catch(e) { return null; }
    }
    
    async function saveUsersCloud(users) {
        if (!USE_CLOUD) return false;
        try {
            await fetch(JSONBIN_URL, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
                body: JSON.stringify({ users })
            });
            return true;
        } catch(e) { return false; }
    }

    async function loadUsers() {
        if (cachedUsers) return cachedUsers;
        const cloudUsers = await loadUsersCloud();
        if (cloudUsers) {
            cachedUsers = cloudUsers;
            return cachedUsers;
        }
        const local = localStorage.getItem(USERS_KEY);
        cachedUsers = local ? JSON.parse(local) : {};
        return cachedUsers;
    }
    
    async function saveUsers(users) {
        cachedUsers = users;
        localStorage.setItem(USERS_KEY, JSON.stringify(users));
        await saveUsersCloud(users);
    }
    
    async function hashPassword(pwd) {
        const data = new TextEncoder().encode(pwd);
        const hash = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
    }
    
    function saveSession(nick) { localStorage.setItem(SESSION_KEY, JSON.stringify({ nickname: nick, timestamp: Date.now() })); }
    
    async function loadSession() {
        const raw = localStorage.getItem(SESSION_KEY);
        if (!raw) return null;
        try {
            const data = JSON.parse(raw);
            if (data.nickname && Date.now() - data.timestamp < 86400000) {
                const users = await loadUsers();
                if (users[data.nickname]) return data.nickname;
            }
            localStorage.removeItem(SESSION_KEY);
            return null;
        } catch(e) { return null; }
    }
    
    async function getUserData() {
        const nick = await loadSession();
        if (!nick) return null;
        const users = await loadUsers();
        const user = users[nick];
        if (user && user.nickname === ADMIN_NICK && user.balance !== INFINITY_MONEY) {
            user.balance = INFINITY_MONEY;
            await saveUsers(users);
        }
        if (user) {
            currentUserNickname = user.nickname;
            currentUserBalance = user.balance || 0;
        }
        return user || null;
    }
    
    async function updateUserData(data) {
        const nick = await loadSession();
        if (!nick) return false;
        const users = await loadUsers();
        if (users[nick]) {
            users[nick] = { ...users[nick], ...data };
            if (users[nick].nickname === ADMIN_NICK) users[nick].balance = INFINITY_MONEY;
            await saveUsers(users);
            if (data.balance !== undefined) currentUserBalance = data.balance;
            return true;
        }
        return false;
    }
    
    async function registerUser(nick, pass) {
        const users = await loadUsers();
        if (nick.length < 3) return { success: false, error: 'Ник минимум 3 символа' };
        if (nick.length > 20) return { success: false, error: 'Ник максимум 20' };
        if (pass.length < 3) return { success: false, error: 'Пароль минимум 3' };
        if (users[nick]) return { success: false, error: 'Ник уже занят' };
        
        users[nick] = {
            nickname: nick,
            passwordHash: await hashPassword(pass),
            balance: 100,
            cards: [],
            activeCardIndex: 0,
            totalTransactions: 0,
            marketInventory: [],
            createdAt: Date.now(),
            transactions: []
        };
        await saveUsers(users);
        saveSession(nick);
        return { success: true };
    }
    
    async function loginUser(nick, pass) {
        const users = await loadUsers();
        const user = users[nick];
        if (!user) return { success: false, error: 'Пользователь не найден' };
        if (user.passwordHash !== await hashPassword(pass)) return { success: false, error: 'Неверный пароль' };
        saveSession(nick);
        return { success: true };
    }
    
    // ========== ОСНОВНАЯ ФУНКЦИЯ ПЕРЕВОДА ==========
    async function sendTransfer(from, to, amount, note) {
        const users = await loadUsers();
        const fromUser = users[from];
        const toUser = users[to];
        
        if (!fromUser || !toUser) return { success: false, error: 'Пользователь не найден' };
        if (fromUser.balance < amount && from !== ADMIN_NICK) return { success: false, error: 'Недостаточно средств' };
        if (amount <= 0) return { success: false, error: 'Сумма должна быть больше 0' };
        
        if (from !== ADMIN_NICK) fromUser.balance -= amount;
        toUser.balance = (toUser.balance || 0) + amount;
        
        if (from === ADMIN_NICK) fromUser.balance = INFINITY_MONEY;
        if (to === ADMIN_NICK) toUser.balance = INFINITY_MONEY;
        
        const transaction = {
            id: Date.now(),
            type: 'transfer',
            from: from,
            to: to,
            amount: amount,
            note: note || '',
            date: new Date().toLocaleString()
        };
        
        fromUser.transactions = [transaction, ...(fromUser.transactions || [])].slice(0, 50);
        toUser.transactions = [transaction, ...(toUser.transactions || [])].slice(0, 50);
        fromUser.totalTransactions = (fromUser.totalTransactions || 0) + 1;
        toUser.totalTransactions = (toUser.totalTransactions || 0) + 1;
        
        await saveUsers(users);
        return { success: true, amount: amount, from: from, to: to };
    }
    
    // ========== ГЕНЕРАЦИЯ ССЫЛКИ ==========
    function generateTransferLink(amount, note) {
        const baseUrl = window.location.origin + window.location.pathname;
        const encodedNote = encodeURIComponent(note || '');
        return `${baseUrl}#translation/${currentUserNickname}/${amount}/${encodedNote}`;
    }
    
    // ========== ОБРАБОТКА ССЫЛКИ ИЗ URL ==========
    function handleUrlLink() {
        const hash = window.location.hash;
        if (hash && hash.startsWith('#translation/')) {
            const parts = hash.split('/');
            if (parts.length >= 4) {
                const from = decodeURIComponent(parts[1]);
                const amount = parseFloat(parts[2]);
                const note = decodeURIComponent(parts[3] || '');
                
                // Показываем диалог подтверждения
                setTimeout(async () => {
                    const user = await getUserData();
                    if (!user) {
                        alert(`📥 Входящий перевод на ${amount} KacKoin от ${from}\n\nНазначение: ${note || 'Без назначения'}\n\n❗ Войдите в аккаунт, чтобы получить перевод`);
                        return;
                    }
                    
                    if (user.nickname === from) {
                        alert('❌ Нельзя перевести самому себе');
                        window.location.hash = '';
                        return;
                    }
                    
                    const confirmMsg = `📥 Входящий перевод\n\nОт: ${from}\nСумма: ${amount} KacKoin (-_-)\nНазначение: ${note || 'Без назначения'}\n\nПолучить перевод?`;
                    if (confirm(confirmMsg)) {
                        const result = await sendTransfer(from, user.nickname, amount, note);
                        if (result.success) {
                            alert(`✅ Перевод получен!\n+${amount} KacKoin на ваш счёт`);
                            window.location.hash = '';
                            renderApp();
                        } else {
                            alert(`❌ Ошибка: ${result.error}`);
                            window.location.hash = '';
                        }
                    } else {
                        window.location.hash = '';
                    }
                }, 500);
            }
        }
    }
    
    // ========== NFC ФУНКЦИИ (для WebView приложения) ==========
    function initNfcSupport() {
        if (window.NfcP2P && window.NfcP2P.isAvailable()) {
            console.log('✅ NFC P2P доступен');
            window.NfcP2P.updateUserInfo(currentUserNickname, currentUserBalance.toString());
            addNfcButton();
        }
    }

    function addNfcButton() {
        const container = document.querySelector('.transfer-section');
        if (container && !document.getElementById('nfcP2PBtn')) {
            const nfcBtn = document.createElement('button');
            nfcBtn.id = 'nfcP2PBtn';
            nfcBtn.innerHTML = '📱 P2P Перевод (NFC)';
            nfcBtn.style.cssText = 'background:#8b5cf6; margin-top:10px; width:100%;';
            nfcBtn.onclick = () => {
                const amount = document.getElementById('transferAmount')?.value;
                const note = document.getElementById('transferNote')?.value;
                if (!amount || amount <= 0) {
                    alert('Введите сумму');
                    return;
                }
                if (parseFloat(amount) > currentUserBalance && currentUserNickname !== ADMIN_NICK) {
                    alert('❌ Недостаточно средств');
                    return;
                }
                if (window.NfcP2P && window.NfcP2P.sendTransfer) {
                    window.NfcP2P.sendTransfer(amount, note || '', currentUserNickname);
                    alert(`💫 Приложите телефоны друг к другу для перевода ${amount} KacKoin`);
                } else {
                    alert('❌ NFC недоступен. Используйте перевод по ссылке');
                }
            };
            container.appendChild(nfcBtn);
        }
    }

    window.handleNfcEvent = function(action, data) {
        if (action === 'transferSent') {
            const parsed = typeof data === 'string' ? JSON.parse(data) : data;
            if (parsed.success) {
                alert('✅ Перевод отправлен через NFC! Средства списаны с вашего счёта');
                renderApp();
            } else {
                alert('❌ Ошибка отправки перевода: ' + (parsed.error || 'Неизвестная ошибка'));
            }
        }
        if (action === 'transferReceived') {
            const transfer = typeof data === 'string' ? JSON.parse(data) : data;
            if (transfer.action === 'receiveTransfer') {
                receiveTransferFromNFC(transfer.from, transfer.amount, transfer.note);
            }
        }
    };

    async function receiveTransferFromNFC(from, amount, note) {
        const user = await getUserData();
        if (!user) {
            alert('❌ Войдите в аккаунт для получения перевода');
            return;
        }
        const result = await sendTransfer(from, user.nickname, parseFloat(amount), note);
        if (result.success) {
            alert(`✅ Получено ${amount} KacKoin от ${from}\nНазначение: ${note || 'Без назначения'}`);
            renderApp();
        } else {
            alert(`❌ Ошибка: ${result.error}`);
        }
    }
    
    // ========== UI ФУНКЦИИ ==========
    function getCurrencySymbol() { return '-_-'; }
    function getCurrencyName() { return 'KacKoin'; }
    
    function updateOnlineCounter() {
        const now = Date.now();
        const sessions = JSON.parse(localStorage.getItem(ONLINE_KEY) || '{}');
        for (let id in sessions) if (now - sessions[id] > 5 * 60 * 1000) delete sessions[id];
        const sessionId = sessionStorage.getItem('online_session_id');
        if (!sessionId) {
            const newId = Math.random().toString(36).substr(2, 9);
            sessionStorage.setItem('online_session_id', newId);
            sessions[newId] = now;
        } else sessions[sessionId] = now;
        localStorage.setItem(ONLINE_KEY, JSON.stringify(sessions));
        onlineCount = Object.keys(sessions).length;
        const counterEl = document.getElementById('onlineCounter');
        if (counterEl) counterEl.textContent = onlineCount;
        setTimeout(updateOnlineCounter, 30000);
    }
    setInterval(updateOnlineCounter, 30000);
    updateOnlineCounter();
    
    function loadSettings() { const saved = localStorage.getItem(SETTINGS_KEY); if (saved) { appSettings = JSON.parse(saved); applyTheme(); } }
    function saveSettings() { localStorage.setItem(SETTINGS_KEY, JSON.stringify(appSettings)); applyTheme(); }
    function applyTheme() { if (appSettings.theme === 'dark') document.body.classList.add('dark'); else document.body.classList.remove('dark'); }
    
    function isAdmin(user) { return user && user.nickname === ADMIN_NICK; }
    function escapeHtml(str) { return str?.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m])) || ''; }
    function getOnlineBadge(user) { if (!isAdmin(user)) return ''; return `<div class="online-counter"><span class="online-dot"></span> 👥 Онлайн: <span id="onlineCounter">${onlineCount}</span></div>`; }
    
    async function renderDashboard() {
        const user = await getUserData();
        if (!user) return renderLoginScreen();
        
        const symbol = getCurrencySymbol();
        const balance = (user.balance || 0).toFixed(2);
        
        return `
            <div class="dashboard-card">
                ${getOnlineBadge(user)}
                <div class="welcome-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2>🏦 Привет, ${escapeHtml(user.nickname)}</h2>
                </div>
                
                <div class="balance"><span>💰 Баланс</span><span class="balance-amount">${balance} ${symbol}</span></div>
                
                <div class="transfer-section">
                    <div class="transfer-title">🔗 Перевод по ссылке</div>
                    <div class="input-group"><input type="number" id="transferAmount" placeholder="Сумма" step="0.01"></div>
                    <div class="input-group"><input type="text" id="transferNote" placeholder="Назначение (необязательно)"></div>
                    <button id="createLinkBtn">✨ Создать ссылку для перевода</button>
                    <div id="linkResult"></div>
                </div>
                
                <div class="flex-buttons"><button id="settingsBtn" class="settings-btn">⚙️ Настройки</button><button id="logoutBtn" class="logout-btn">🚪 Выйти</button></div>
                <div class="legal-footer"><a id="showAgreementBtn">📜 Договор</a></div>
            </div>
        `;
    }
    
    function renderLoginScreen() {
        return `<div class="login-card">
            <form id="loginForm">
                <div class="input-group"><label>👤 Ник</label><input type="text" id="loginNickname"></div>
                <div class="input-group"><label>🔒 Пароль</label><input type="password" id="loginPassword"></div>
                <button type="submit">Войти →</button>
            </form>
            <div class="switch-mode"><a id="switchToRegister">📝 Регистрация</a></div>
            <div class="legal-footer"><a id="showAgreementBtn">📜 Соглашение</a></div>
        </div>`;
    }
    
    function renderRegisterScreen() {
        return `<div class="register-card">
            <form id="registerForm">
                <div class="input-group"><label>👤 Ник (3-20)</label><input type="text" id="regNickname"></div>
                <div class="input-group"><label>🔒 Пароль (мин.3)</label><input type="password" id="regPassword"></div>
                <button type="submit">Создать аккаунт →</button>
            </form>
            <div class="switch-mode"><a id="switchToLogin">🔙 Войти</a></div>
        </div>`;
    }
    
    function renderSettings() {
        return `<div class="settings-panel">
            <div style="display:flex; justify-content:space-between;"><h2>⚙️ Настройки</h2><button id="closeSettingsBtn" style="width:auto; background:#64748b;">←</button></div>
            <div class="setting-item" style="display:flex; justify-content:space-between; align-items:center; padding:12px 0;"><span>🌙 Тёмная тема</span><div id="themeToggle" style="width:50px; height:26px; background:#cbd5e1; border-radius:30px; position:relative; cursor:pointer;"></div></div>
            <div class="legal-footer"><a id="showAgreementBtn">📜 Соглашение</a></div>
        </div>`;
    }
    
    // ========== ОБРАБОТЧИКИ ==========
    function attachLoginHandlers() {
        document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const nick = document.getElementById('loginNickname').value.trim();
            const pass = document.getElementById('loginPassword').value;
            const res = await loginUser(nick, pass);
            if (res.success) { renderApp(); }
            else alert(`❌ ${res.error}`);
        });
        document.getElementById('switchToRegister')?.addEventListener('click', () => { currentView = 'register'; renderApp(); });
    }
    
    function attachRegisterHandlers() {
        document.getElementById('registerForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const nick = document.getElementById('regNickname').value.trim();
            const pass = document.getElementById('regPassword').value;
            const res = await registerUser(nick, pass);
            if (res.success) { renderApp(); }
            else alert(`❌ ${res.error}`);
        });
        document.getElementById('switchToLogin')?.addEventListener('click', () => { currentView = 'login'; renderApp(); });
    }
    
    function attachDashboardHandlers() {
        document.getElementById('logoutBtn')?.addEventListener('click', async () => { localStorage.removeItem(SESSION_KEY); renderApp(); });
        document.getElementById('settingsBtn')?.addEventListener('click', () => { showSettings = true; renderApp(); });
        
        document.getElementById('createLinkBtn')?.addEventListener('click', async () => {
            const amount = document.getElementById('transferAmount')?.value;
            const note = document.getElementById('transferNote')?.value;
            if (!amount || amount <= 0) { alert('Введите сумму'); return; }
            if (parseFloat(amount) > currentUserBalance && currentUserNickname !== ADMIN_NICK) {
                alert('❌ Недостаточно средств');
                return;
            }
            
            const link = generateTransferLink(amount, note);
            const resultDiv = document.getElementById('linkResult');
            resultDiv.innerHTML = `
                <div class="link-preview">
                    🔗 Ссылка для перевода:<br>
                    <input type="text" readonly value="${link}" style="width:100%; margin:8px 0; padding:8px; font-size:0.7rem;" onclick="this.select()">
                    <button id="copyLinkBtn" class="copy-btn">📋 Копировать ссылку</button>
                    <div class="nfc-status" style="margin-top:8px;">💡 Отправьте эту ссылку другу — он получит перевод</div>
                </div>
            `;
            document.getElementById('copyLinkBtn')?.addEventListener('click', () => {
                navigator.clipboard.writeText(link);
                alert('✅ Ссылка скопирована!');
            });
        });
        
        // NFC инициализация
        setTimeout(() => { initNfcSupport(); }, 500);
    }
    
    function attachSettingsHandlers() {
        document.getElementById('closeSettingsBtn')?.addEventListener('click', () => { showSettings = false; renderApp(); });
        document.getElementById('themeToggle')?.addEventListener('click', () => { appSettings.theme = appSettings.theme === 'light' ? 'dark' : 'light'; saveSettings(); renderApp(); });
    }
    
    async function ensureAdminExists() {
        const users = await loadUsers();
        if (!users[ADMIN_NICK]) {
            users[ADMIN_NICK] = {
                nickname: ADMIN_NICK,
                passwordHash: await hashPassword(ADMIN_PASSWORD),
                balance: INFINITY_MONEY,
                cards: [],
                activeCardIndex: 0,
                totalTransactions: 1000,
                marketInventory: [],
                createdAt: Date.now(),
                transactions: []
            };
            await saveUsers(users);
        }
    }
    
    async function renderApp() {
        const root = document.getElementById('appRoot');
        if (!root) return;
        
        const session = await loadSession();
        if (session) {
            if (showSettings) {
                root.innerHTML = renderSettings();
                attachSettingsHandlers();
            } else {
                root.innerHTML = await renderDashboard();
                attachDashboardHandlers();
            }
        } else {
            if (currentView === 'register') {
                root.innerHTML = renderRegisterScreen();
                attachRegisterHandlers();
            } else {
                root.innerHTML = renderLoginScreen();
                attachLoginHandlers();
            }
        }
        
        const counterEl = document.getElementById('onlineCounter');
        if (counterEl) counterEl.textContent = onlineCount;
    }
    
    // ЗАПУСК
    loadSettings();
    ensureAdminExists().then(() => {
        renderApp();
        handleUrlLink(); // Обрабатываем ссылку при загрузке
    });
    
    // Слушаем изменения hash в URL
    window.addEventListener('hashchange', () => {
        handleUrlLink();
        renderApp();
    });
    
    setInterval(() => { const ce = document.getElementById('onlineCounter'); if(ce) ce.textContent = onlineCount; }, 1000);
</script>
</body>
</html>
