    let onlineCount = 0;
    function updateOnlineCounter() {
        const now = Date.now();

    async function hashPassword(pwd) {
        const data = new TextEncoder().encode(pwd);
        const hash = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

            return null;

    function purchaseItem(itemId) {
        const user = getUserData();
        if (!user) return { success: false, error: 'Ошибка авторизации' };
        
        const item = ALL_ITEMS.find(i => i.id === itemId);
        if (!item) return { success: false, error: 'Товар не найден' };
        
        if (user.marketInventory?.includes(itemId)) {
            return { success: false, error: 'Товар уже куплен' };
        }
        
        if ((user.balance || 0) < item.price) {
            return { success: false, error: `Недостаточно ${getCurrencyName()}. Нужно: ${item.price} ${getCurrencySymbol()}` };
        }
        
        user.balance = (user.balance || 0) - item.price;
        if (!user.marketInventory) user.marketInventory = [];
        user.marketInventory.push(itemId);
        
        if (item.type === 'boost') {
            if (!user.activeBoosts) user.activeBoosts = [];
            user.activeBoosts.push({
                id: item.id,
                value: item.value,
                expiresAt: Date.now() + (item.duration * 1000)
            });
        }
        
        const users = loadUsers();
        users[user.nickname] = user;
        saveUsers(users);
        return { success: true, item: item };
    }
    
    function equipItem(itemId) {
        const user = getUserData();
        if (!user) return false;
        const item = ALL_ITEMS.find(i => i.id === itemId);
        if (!item) return false;
        if (!user.marketInventory?.includes(itemId)) return false;
        
        if (item.type === 'prefix') {
            updateUserData({ equippedPrefix: itemId });
        } else if (item.type === 'skin') {
            updateUserData({ equippedSkin: itemId });
        } else if (item.type === 'effect') {
            updateUserData({ equippedEffect: itemId });
        }
        return true;
    }

        const user = getUserData();
        if (!user?.equippedPrefix) return null;
        const item = ALL_ITEMS.find(i => i.id === user.equippedPrefix);

    function getLevelInfo(transactions) {
        for (let i = LEVELS.length - 1; i >= 0; i--) {
            if (transactions >= LEVELS[i].minTrans) {
                const current = LEVELS[i];
                const next = LEVELS[i + 1] || null;
                const progress = next ? ((transactions - current.minTrans) / (next.minTrans - current.minTrans)) * 100 : 100;
                return { current, next, progress: Math.min(100, progress) };
            }
        }
        return { current: LEVELS[0], next: LEVELS[1], progress: 0 };
    }

    function generateContractNumber() {
        return `NCP-${new Date().getFullYear()}${String(new Date().getMonth()+1).padStart(2,'0')}-${Math.floor(Math.random()*10000).toString().padStart(4,'0')}`;
    }
    
    function createTransferLink(amount, note) {
        const user = getUserData();
        if (!user) return null;
        if ((user.balance || 0) < amount) return { error: `Недостаточно ${getCurrencyName()}` };
        const contract = generateContractNumber();
        const link = `${window.location.origin}${window.location.pathname}#transfer/${encodeURIComponent(user.nickname)}/${encodeURIComponent(contract)}/${amount}/${encodeURIComponent(note || '')}`;
        return { link, contractNumber: contract, note: note || '' };
    }
    
    function executeTransfer(fromNick, amount, contract, note) {
        const current = getUserData();
        if (!current) return { success: false, error: 'Ошибка авторизации' };
        if (fromNick === current.nickname) return { success: false, error: 'Нельзя перевести самому себе' };
        
        const users = loadUsers();
        const fromUser = users[fromNick];
        if (!fromUser) return { success: false, error: 'Отправитель не найден' };
        if ((fromUser.balance || 0) < amount) return { success: false, error: 'Недостаточно средств у отправителя' };
        
        const txFrom = { id: Date.now(), type: 'out', to: current.nickname, amount, date: new Date().toLocaleString(), method: 'link', contractNumber: contract, note };
        const txTo = { id: Date.now(), type: 'in', from: fromUser.nickname, amount, date: new Date().toLocaleString(), method: 'link', contractNumber: contract, note };
        
        fromUser.balance = (fromUser.balance || 0) - amount;
        current.balance = (current.balance || 0) + amount;
        fromUser.totalTransactions = (fromUser.totalTransactions || 0) + 1;
        current.totalTransactions = (current.totalTransactions || 0) + 1;
        
        fromUser.transactions = [txFrom, ...(fromUser.transactions || [])].slice(0, 50);
        current.transactions = [txTo, ...(current.transactions || [])].slice(0, 50);
        
        users[fromUser.nickname] = fromUser;
        users[current.nickname] = current;
        saveUsers(users);
        
        return { success: true, amount, from: fromUser.nickname, contract };
    }

    function formatCardNumber(num) {
        if (!num) return '**** **** **** ****';
        const parts = num.split(' ');
        return parts.length === 4 ? `${parts[0]} **** **** ${parts[3]}` : num;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m]));

    function attachLoginHandlers() {
        document.getElementById('loginForm')?.addEventListener('submit', async (e) => {

            const nick = document.getElementById('loginNickname').value.trim();
            const pass = document.getElementById('loginPassword').value;
            const users = loadUsers();
            const user = users[nick];
            if (!user) { alert('❌ Пользователь не найден'); return; }
            if (user.passwordHash !== await hashPassword(pass)) { alert('❌ Неверный пароль'); return; }
            saveSession(nick);
            currentPage = 'dashboard';
            renderApp();
        });
        document.getElementById('switchToRegister')?.addEventListener('click', () => { currentView = 'register'; renderApp(); });
        document.getElementById('showAgreementBtn')?.addEventListener('click', () => { showAgreementModal = true; renderApp(); });
    }
    
    function attachRegisterHandlers() {
        document.getElementById('registerForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const nick = document.getElementById('regNickname').value.trim();
            const pass = document.getElementById('regPassword').value;
            if (nick.length < 3) { alert('❌ Ник минимум 3 символа'); return; }
            if (pass.length < 3) { alert('❌ Пароль минимум 3 символа'); return; }
            const users = loadUsers();
            if (users[nick]) { alert('❌ Ник уже занят'); return; }
            users[nick] = {
                nickname: nick,
                passwordHash: await hashPassword(pass),
                balance: 100,
                cards: [],
                activeCardIndex: 0,
                totalTransactions: 0,
                marketInventory: [],
                activeBoosts: [],
                createdAt: Date.now(),
                transactions: []
            };
            saveUsers(users);
            saveSession(nick);
            currentPage = 'dashboard';
            renderApp();
        });
        document.getElementById('switchToLogin')?.addEventListener('click', () => { currentView = 'login'; renderApp(); });
    }
    
    function attachDashboardHandlers() {
        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            localStorage.removeItem(SESSION_KEY);
            localStorage.removeItem(CURRENT_USER_KEY);
            currentPage = 'dashboard';
            renderApp();
        });
        document.getElementById('marketplaceBtn')?.addEventListener('click', () => { currentPage = 'marketplace'; renderApp(); });
        document.getElementById('settingsBtn')?.addEventListener('click', () => { showSettings = true; renderApp(); });
        document.getElementById('createCardBtn')?.addEventListener('click', () => { showCreateCard = true; renderApp(); });
        document.getElementById('addCardBtn')?.addEventListener('click', () => { showCreateCard = true; renderApp(); });
        document.getElementById('clickableCard')?.addEventListener('click', () => { alert('💳 Детали карты (в разработке)'); });
        document.querySelectorAll('.card-tab').forEach(el => {
            el.addEventListener('click', () => setActiveCard(parseInt(el.dataset.cardIdx)));
        });
        
        // СОЗДАНИЕ ССЫЛКИ НА ПЕРЕВОД
        document.getElementById('createLinkBtn')?.addEventListener('click', () => {
            const amount = parseFloat(document.getElementById('transferAmount')?.value);
            const note = document.getElementById('transferNote')?.value || '';
            if (!amount || amount <= 0) { alert('Введите сумму'); return; }
            const user = getUserData();
            if ((user.balance || 0) < amount) { alert(`Недостаточно ${getCurrencyName()}`); return; }
            const res = createTransferLink(amount, note);
            if (res.error) alert(res.error);
            else { 
                currentLink = res.link; 
                currentContract = res.contractNumber; 
                currentNote = res.note; 
                renderApp(); 
            }
        });
        
        document.getElementById('clearLinkBtn')?.addEventListener('click', () => { 
            currentLink = null; 
            currentContract = null; 
            currentNote = ''; 
            renderApp(); 
        });
        
        document.getElementById('copyLinkBtn')?.addEventListener('click', () => {
            const ta = document.getElementById('transferLink');
            if (ta) { ta.select(); document.execCommand('copy'); alert('✅ Ссылка скопирована! Отправь её другу.'); }
        });
        
        // ОБРАБОТКА ПЕРЕХОДА ПО ССЫЛКЕ
        if (window.location.hash && window.location.hash.startsWith('#transfer/')) {
            const parts = window.location.hash.split('/');
            if (parts.length >= 5) {
                const fromNick = decodeURIComponent(parts[1]);
                const contract = decodeURIComponent(parts[2]);
                const amount = parseFloat(parts[3]);
                const note = decodeURIComponent(parts[4] || '');
                const cur = getUserData();
                if (!cur) alert('❌ Войдите в аккаунт, чтобы получить перевод');
                else if (fromNick === cur.nickname) alert('❌ Нельзя перевести самому себе');
                else if (confirm(`📥 Получить перевод ${amount} ${getCurrencySymbol()} от ${fromNick}? ${note ? `\n📝 ${note}` : ''}`)) {
                    const res = executeTransfer(fromNick, amount, contract, note);
                    alert(res.success ? `✅ Получено ${res.amount} ${getCurrencySymbol()} от ${res.from}` : `❌ ${res.error}`);
                    window.location.hash = '';
                    renderApp();
                } else window.location.hash = '';
            }
        }
        
        document.getElementById('adminGiveBtn')?.addEventListener('click', () => {
            const nick = document.getElementById('adminGiveNick')?.value.trim();
            const amount = parseFloat(document.getElementById('adminGiveAmount')?.value);
            if (!nick || !amount || amount <= 0) {
                document.getElementById('adminMsg').innerHTML = '<div class="error-msg">❌ Введите ник и сумму</div>';
                return;
            }
            const res = adminGiveMoney(nick, amount);
            if (res.success) {
                document.getElementById('adminMsg').innerHTML = `<div class="success-msg">✅ Выдано ${amount} ${getCurrencySymbol()} пользователю ${escapeHtml(nick)}</div>`;
                document.getElementById('adminGiveNick').value = '';
                document.getElementById('adminGiveAmount').value = '';
                renderApp();
            } else {
                document.getElementById('adminMsg').innerHTML = `<div class="error-msg">❌ ${res.error}</div>`;
            }
            setTimeout(() => { const msg = document.getElementById('adminMsg'); if(msg) msg.innerHTML = ''; }, 3000);
        });
    }
    
    function attachMarketplaceHandlers() {
        document.getElementById('backToDashboardBtn')?.addEventListener('click', () => { currentPage = 'dashboard'; renderApp(); });
        
        document.querySelectorAll('.buy-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const itemId = btn.dataset.id;
                const result = purchaseItem(itemId);
                if (result.success) {
                    alert(`✅ Куплено: ${result.item.name}!`);
                    renderApp();
                } else {
                    alert(`❌ ${result.error}`);
                }
            });
        });
        
        document.querySelectorAll('.equip-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const itemId = btn.dataset.id;
                if (equipItem(itemId)) {
                    alert('✅ Экипировано!');
                    renderApp();
                }
            });
        });
    }
    
    function attachCreateCardHandlers() {
        document.getElementById('backFromCreateBtn')?.addEventListener('click', () => { showCreateCard = false; renderApp(); });
        document.querySelectorAll('.card-type-option').forEach(el => {
            el.addEventListener('click', () => { selectedCardType = el.dataset.cardId; renderApp(); });
        });
        document.getElementById('confirmCreateCardBtn')?.addEventListener('click', () => {
            const number = document.getElementById('cardNumberInput').value.trim();
            const cvv = document.getElementById('cvvInput').value.trim();
            const msg = document.getElementById('createCardMsg');
            const clean = number.replace(/\s/g, '');
            if (!clean || clean.length !== 16 || !/^\d+$/.test(clean)) { msg.innerHTML = '<div class="error-msg">❌ 16 цифр номера</div>'; return; }
            if (!cvv || cvv.length !== 3 || !/^\d+$/.test(cvv)) { msg.innerHTML = '<div class="error-msg">❌ 3 цифры CVV</div>'; return; }
            const formatted = clean.replace(/(\d{4})(?=\d)/g, '$1 ');
            const res = addCard(selectedCardType, formatted, cvv);
            if (res.success) {
                msg.innerHTML = '<div class="success-msg">✅ Карта создана!</div>';
                setTimeout(() => { showCreateCard = false; renderApp(); }, 1000);
            } else {
                msg.innerHTML = `<div class="error-msg">❌ ${res.error}</div>`;
            }
        });
    }
    
    function attachSettingsHandlers() {
        document.getElementById('closeSettingsBtn')?.addEventListener('click', () => { showSettings = false; renderApp(); });
        document.getElementById('themeToggle')?.addEventListener('click', () => {
            appSettings.theme = appSettings.theme === 'light' ? 'dark' : 'light';
            saveSettings();
            renderApp();
        });
        document.getElementById('resetAllDataBtn')?.addEventListener('click', () => {
            if (confirm('⚠️ Удалить ВСЕ данные?')) {
                localStorage.clear();
                location.reload();
            }
        });
        document.getElementById('showAgreementBtn')?.addEventListener('click', () => { showAgreementModal = true; renderApp(); });
    }
    
    function attachAgreementHandlers() {
        document.getElementById('acceptBtn')?.addEventListener('click', () => { localStorage.setItem(AGREEMENT_KEY, 'true'); showAgreementModal = false; renderApp(); });
        document.getElementById('declineBtn')?.addEventListener('click', () => { alert('❌ Без принятия условий нельзя'); });
    }

    async function ensureAdminExists() {
        const users = loadUsers();
        if (!users[ADMIN_NICK]) {
            users[ADMIN_NICK] = {
                nickname: ADMIN_NICK,
                passwordHash: await hashPassword(ADMIN_PASSWORD),
                balance: 999999,
                cards: [],
                activeCardIndex: 0,
                totalTransactions: 999,
                marketInventory: [],
                activeBoosts: [],
                completedTasks: { visitNcp: true },
                createdAt: Date.now(),
                transactions: []
            };
            saveUsers(users);
            console.log('✅ Админ KacERORga создан с паролем 6369');
        }
    }

    function renderApp() {
        const root = document.getElementById('appRoot');
        if (!root) return;
        
        if (showAgreementModal) {
            root.innerHTML = renderAgreementModal();
            attachAgreementHandlers();
            return;
        }
        
        const session = loadSession();
        if (session) {
            if (showSettings) {
                root.innerHTML = renderSettings();
                attachSettingsHandlers();
            } else if (showCreateCard) {
                root.innerHTML = renderCreateCardPage();
                attachCreateCardHandlers();
            } else if (currentPage === 'marketplace') {
                root.innerHTML = renderMarketplace();
                attachMarketplaceHandlers();
            } else {
                root.innerHTML = renderDashboard();
                attachDashboardHandlers();
            }
        } else {
            if (currentView === 'register') {
                root.innerHTML = renderRegisterScreen();
                attachRegisterHandlers();
            } else {
                root.innerHTML = renderLoginScreen();
                attachLoginHandlers();
            }
        }
        
        const counterEl = document.getElementById('onlineCounter');
        if (counterEl) counterEl.textContent = onlineCount;
    }

    // Инициализация
    loadSettings();
    if (!localStorage.getItem(AGREEMENT_KEY)) showAgreementModal = true;
    ensureAdminExists().then(() => renderApp());
    setInterval(() => {
        const counterEl = document.getElementById('onlineCounter');
        if (counterEl) counterEl.textContent = onlineCount;
    }, 1000);
</script>
</body>
</html>
