    function updateOnlineCounter() {
        const now = Date.now();
        const sessions = JSON.parse(localStorage.getItem(ONLINE_KEY) || '{}');
        for (let id in sessions) if (now - sessions[id] > 5 * 60 * 1000) delete sessions[id];
        const sessionId = sessionStorage.getItem('online_session_id');
        if (!sessionId) {
            const newId = Math.random().toString(36).substr(2, 9);
            sessionStorage.setItem('online_session_id', newId);
            sessions[newId] = now;
        } else sessions[sessionId] = now;
        localStorage.setItem(ONLINE_KEY, JSON.stringify(sessions));
        onlineCount = Object.keys(sessions).length;
        const counterEl = document.getElementById('onlineCounter');
        if (counterEl) counterEl.textContent = onlineCount;
        setTimeout(updateOnlineCounter, 30000);

    async function hashPassword(pwd) {
        const data = new TextEncoder().encode(pwd);
        const hash = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    function loadSession() {
        const raw = localStorage.getItem(SESSION_KEY);
        if (!raw) return null;
        try {
            const data = JSON.parse(raw);
            if (data.nickname && Date.now() - data.timestamp < 86400000) return data.nickname;
            localStorage.removeItem(SESSION_KEY);
            return null;
        } catch(e) { return null; }
    }

        const user = users[nick];
        if (user && user.nickname === ADMIN_NICK && user.balance !== INFINITY_MONEY) {
            user.balance = INFINITY_MONEY;
            users[nick] = user;
            saveUsers(users);
        }
        return users[nick] || null;
    }

        const item = ALL_ITEMS.find(i => i.id === itemId);

        if (user.marketInventory?.includes(itemId)) return { success: false, error: 'Услуга уже активирована' };
        if ((user.balance || 0) < item.price && user.nickname !== ADMIN_NICK) return { success: false, error: `Недостаточно средств` };
        
        if (user.nickname !== ADMIN_NICK) user.balance -= item.price;
        if (!user.marketInventory) user.marketInventory = [];
        user.marketInventory.push(itemId);
        
        if (item.type === 'boost') {
            if (!user.activeBoosts) user.activeBoosts = [];
            user.activeBoosts.push({ id: item.id, value: parseFloat(item.value), expiresAt: Date.now() + (item.duration * 1000) });
        }
        if (item.type === 'money') {
            user.balance += item.value;
        }
        
        if (user.nickname === ADMIN_NICK) user.balance = INFINITY_MONEY;
        const users = loadUsers();
        users[user.nickname] = user;
        saveUsers(users);
        return { success: true, item: item };

    function getDepositIncome(user) {
        if (!user.activeDeposit) return 0;
        const deposit = INVESTMENTS.deposits.find(d => d.id === user.activeDeposit.id);
        if (!deposit) return 0;
        const daysPassed = Math.floor((Date.now() - user.activeDeposit.startDate) / (1000 * 60 * 60 * 24));
        if (daysPassed >= deposit.minDays) {
            const income = user.activeDeposit.amount * (deposit.dailyPercent / 100) * daysPassed;
            user.activeDeposit = null;
            return income;
        }
        return 0;
    }
    
    function getAssetsIncome(user) {
        if (!user.assets) return 0;
        let total = 0;
        for (let a of user.assets) {
            const asset = INVESTMENTS.assets.find(ast => ast.id === a.id);
            if (asset) total += asset.income;
        }
        return total;
    }
    
    function getMiningIncome(user) {
        if (!user.mining) return 0;
        let total = 0;
        for (let m of user.mining) {
            const mine = INVESTMENTS.mining.find(mn => mn.id === m.id);
            if (mine) total += mine.income;
        }
        return total;
    }
    
    function getSecuritiesIncome(user) {

        let total = 0;
        for (let s of user.securities) {

    function getClientStatus(transactions) {
        for (let i = CLIENT_STATUSES.length - 1; i >= 0; i--) {
            if (transactions >= CLIENT_STATUSES[i].minTrans) {
                const current = CLIENT_STATUSES[i];
                const next = CLIENT_STATUSES[i + 1] || null;
                const progress = next ? ((transactions - current.minTrans) / (next.minTrans - current.minTrans)) * 100 : 100;
                return { current, next, progress: Math.min(100, progress) };
            }
        }
        return { current: CLIENT_STATUSES[0], next: CLIENT_STATUSES[1], progress: 0 };
    }

    function generateContractNumber() { return `NCP-${new Date().getFullYear()}${String(new Date().getMonth()+1).padStart(2,'0')}-${Math.floor(Math.random()*10000).toString().padStart(4,'0')}`; }
    
    function createTransferLink(amount, note) {
        const user = getUserData();
        if (!user) return null;
        if ((user.balance || 0) < amount && user.nickname !== ADMIN_NICK) return { error: `Недостаточно средств` };
        const contract = generateContractNumber();
        const link = `${location.origin}${location.pathname}#transfer/${encodeURIComponent(user.nickname)}/${encodeURIComponent(contract)}/${amount}/${encodeURIComponent(note || '')}`;
        return { link, contractNumber: contract, note: note || '' };
    }
    
    function executeTransfer(fromNick, amount, contract, note) {
        const current = getUserData();
        if (!current) return { success: false, error: 'Ошибка авторизации' };
        if (fromNick === current.nickname) return { success: false, error: 'Нельзя перевести самому себе' };
        const users = loadUsers();
        const fromUser = users[fromNick];
        if (!fromUser) return { success: false, error: 'Отправитель не найден' };
        if ((fromUser.balance || 0) < amount && fromNick !== ADMIN_NICK) return { success: false, error: 'Недостаточно средств' };
        
        const boosts = getActiveBoosts();
        let multiplier = 1;
        for (let b of boosts) multiplier *= b.value;
        const hour = new Date().getHours();
        if (hour >= 19 && hour < 20) multiplier *= 1.5;
        const day = new Date().getDay();
        if (day === 6 || day === 0) multiplier *= 2;
        const boostedAmount = amount * multiplier;
        
        if (fromNick !== ADMIN_NICK) fromUser.balance -= amount;
        current.balance += boostedAmount;
        fromUser.totalTransactions = (fromUser.totalTransactions || 0) + 1;
        current.totalTransactions = (current.totalTransactions || 0) + 1;
        
        if (fromNick === ADMIN_NICK) fromUser.balance = INFINITY_MONEY;
        if (current.nickname === ADMIN_NICK) current.balance = INFINITY_MONEY;
        
        fromUser.transactions = [{ id: Date.now(), type: 'out', to: current.nickname, amount, date: new Date().toLocaleString(), method: 'link', contractNumber: contract, note }, ...(fromUser.transactions || [])].slice(0,50);
        current.transactions = [{ id: Date.now(), type: 'in', from: fromUser.nickname, amount: boostedAmount, date: new Date().toLocaleString(), method: 'link', contractNumber: contract, note }, ...(current.transactions || [])].slice(0,50);
        
        users[fromUser.nickname] = fromUser;
        users[current.nickname] = current;
        saveUsers(users);
        checkAchievements();
        return { success: true, amount: boostedAmount, from: fromUser.nickname, contract };
    }

    function attachLoginHandlers() {
        document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const nick = document.getElementById('loginNickname').value.trim();
            const pass = document.getElementById('loginPassword').value;
            const users = loadUsers();
            const user = users[nick];
            if (!user) { alert('❌ Пользователь не найден'); return; }
            if (user.passwordHash !== await hashPassword(pass)) { alert('❌ Неверный пароль'); return; }
            saveSession(nick);
            currentTab = 'dashboard';
            renderApp();
        });
        document.getElementById('switchToRegister')?.addEventListener('click', () => { currentView = 'register'; renderApp(); });

    function attachCreateCardHandlers() {
        document.getElementById('backFromCreateBtn')?.addEventListener('click', () => { showCreateCard = false; renderApp(); });
        document.querySelectorAll('.card-type-option').forEach(el => {
            el.addEventListener('click', () => { selectedCardType = el.dataset.cardId; renderApp(); });
        });
        document.getElementById('confirmCreateCardBtn')?.addEventListener('click', () => {
            const number = document.getElementById('cardNumberInput').value.trim();
            const cvv = document.getElementById('cvvInput').value.trim();
            const msg = document.getElementById('createCardMsg');
            const clean = number.replace(/\s/g, '');
            if (!clean || clean.length !== 16 || !/^\d+$/.test(clean)) { msg.innerHTML = '<div class="error-msg">❌ 16 цифр номера</div>'; return; }
            if (!cvv || cvv.length !== 3 || !/^\d+$/.test(cvv)) { msg.innerHTML = '<div class="error-msg">❌ 3 цифры CVV</div>'; return; }
            const formatted = clean.replace(/(\d{4})(?=\d)/g, '$1 ');
            const res = addCard(selectedCardType, formatted, cvv);
            if (res.success) { msg.innerHTML = '<div class="success-msg">✅ Карта создана</div>'; setTimeout(() => { showCreateCard = false; renderApp(); }, 1000); }
            else msg.innerHTML = `<div class="error-msg">❌ ${res.error}</div>`;
        });
    }
    
    function attachSettingsHandlers() {
        document.getElementById('closeSettingsBtn')?.addEventListener('click', () => { showSettings = false; renderApp(); });
        document.getElementById('themeToggle')?.addEventListener('click', () => { appSettings.theme = appSettings.theme === 'light' ? 'dark' : 'light'; saveSettings(); renderApp(); });
        document.getElementById('resetAllDataBtn')?.addEventListener('click', () => { if(confirm('Удалить все данные?')) { localStorage.clear(); location.reload(); } });
        document.getElementById('showAgreementBtn')?.addEventListener('click', () => { showAgreementModal = true; renderApp(); });
    }
    
    function attachAgreementHandlers() {
        document.getElementById('acceptBtn')?.addEventListener('click', () => { localStorage.setItem(AGREEMENT_KEY, 'true'); showAgreementModal = false; renderApp(); });
        document.getElementById('declineBtn')?.addEventListener('click', () => { alert('❌ Без принятия условий нельзя'); });
    }

    async function ensureAdminExists() {
        const users = loadUsers();
        if (!users[ADMIN_NICK]) {
            users[ADMIN_NICK] = {
                nickname: ADMIN_NICK,
                passwordHash: await hashPassword(ADMIN_PASSWORD),
                balance: INFINITY_MONEY,
                cards: [],
                activeCardIndex: 0,
                totalTransactions: 1000,
                marketInventory: [],
                achievements: [],
                assets: [],
                mining: [],
                securities: [],
                realty: [],
                activeBoosts: [],
                streak: 100,
                createdAt: Date.now(),
                transactions: []
            };
            saveUsers(users);
            console.log('✅ Админ KacERORga создан с бесконечными деньгами и максимальным уровнем');
        }
    }

    function renderApp() {
        const root = document.getElementById('appRoot');
        if (!root) return;
        
        if (showAgreementModal) {
            root.innerHTML = renderAgreementModal();
            attachAgreementHandlers();
            return;
        }
        
        const session = loadSession();
        if (session) {
            if (showSettings) {
                root.innerHTML = renderSettings();
                attachSettingsHandlers();
            } else if (showCreateCard) {
                root.innerHTML = renderCreateCardPage();
                attachCreateCardHandlers();
            } else if (currentTab === 'investments') {
                root.innerHTML = renderInvestments();
                attachDashboardHandlers();
            } else if (currentTab === 'loyalty') {
                root.innerHTML = renderLoyalty();
                attachDashboardHandlers();
            } else if (currentTab === 'market') {
                root.innerHTML = renderMarketplace();
                attachDashboardHandlers();
            } else if (currentTab === 'admin' && isAdmin()) {
                root.innerHTML = renderAdminPanel();
                attachDashboardHandlers();
            } else {
                root.innerHTML = renderDashboard();
                attachDashboardHandlers();
            }
        } else {
            if (currentView === 'register') {
                root.innerHTML = renderRegisterScreen();
                attachRegisterHandlers();
            } else {
                root.innerHTML = renderLoginScreen();
                attachLoginHandlers();
            }
        }
        
        const counterEl = document.getElementById('onlineCounter');
        if (counterEl) counterEl.textContent = onlineCount;
    }

    loadSettings();
    if (!localStorage.getItem(AGREEMENT_KEY)) showAgreementModal = true;
    ensureAdminExists().then(() => renderApp());
    setInterval(() => { const ce = document.getElementById('onlineCounter'); if(ce) ce.textContent = onlineCount; }, 1000);
</script>
</body>
</html>
