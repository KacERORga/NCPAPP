<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NCPBANK — Анонимный кошелек</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        body.dark {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .app-container {
            max-width: 550px;
            width: 100%;
            margin: 0 auto;
        }

        .ncp-logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .ncp-logo h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .ncp-logo p {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.7);
            margin-top: 4px;
        }

        /* Общие карточки */
        .card, .login-card, .dashboard-card, .register-card, .settings-panel, .card-detail-page, .create-card-page, .legal-page {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 32px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.3);
            padding: 28px 24px 32px;
            transition: background 0.3s ease;
        }

        body.dark .card,
        body.dark .login-card,
        body.dark .dashboard-card,
        body.dark .register-card,
        body.dark .settings-panel,
        body.dark .card-detail-page,
        body.dark .create-card-page,
        body.dark .legal-page {
            background: rgba(30, 41, 59, 0.98);
            color: #f1f5f9;
        }

        /* Модальное окно */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            max-width: 500px;
            width: 90%;
            background: white;
            border-radius: 32px;
            padding: 28px;
            max-height: 85vh;
            overflow-y: auto;
        }
        body.dark .modal-content {
            background: #1e293b;
            color: #f1f5f9;
        }
        .modal-content h2 {
            margin-bottom: 16px;
            font-size: 1.5rem;
        }
        .legal-scroll {
            max-height: 350px;
            overflow-y: auto;
            padding-right: 10px;
            margin: 16px 0;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 16px;
            font-size: 0.85rem;
        }
        body.dark .legal-scroll {
            border-color: #475569;
        }
        .legal-scroll p {
            margin-bottom: 10px;
            line-height: 1.4;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .modal-actions button {
            flex: 1;
            margin-top: 0;
        }
        .accept-btn {
            background: #10b981;
        }
        .decline-btn {
            background: #ef4444;
        }

        /* Банковская карта */
        .bank-card {
            background: linear-gradient(135deg, #1E2A3E 0%, #0F1722 100%);
            border-radius: 24px;
            padding: 24px;
            color: white;
            margin-bottom: 24px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .bank-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.4);
        }
        .card-chip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .chip-icon {
            background: linear-gradient(145deg, #E9B35F, #D4A04A);
            width: 45px;
            height: 35px;
            border-radius: 8px;
            position: relative;
        }
        .chip-icon:before {
            content: "";
            position: absolute;
            width: 70%;
            height: 55%;

            top: 22%;
            left: 15%;
            border-radius: 4px;

        .card-network {
            font-size: 12px;
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;

        .card-number {
            font-size: 1.2rem;

        }
        .card-details {

        .card-holder span, .card-expiry span {

            opacity: 0.6;
        }
        .card-holder p, .card-expiry p {
            font-size: 0.9rem;

        }

        /* Формы */
        .input-group {
            margin-bottom: 18px;
        }
        label {
            font-weight: 600;
            font-size: 0.8rem;
            color: #334155;

            margin-bottom: 6px;
        }
        body.dark label {

        }
        input {
            width: 100%;
            padding: 12px 18px;
            font-size: 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 60px;
            background: white;

        }
        body.dark input {
            background: #1e293b;
            border-color: #475569;
            color: #f1f5f9;
        }
        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
        }
        button {
            background: #1f2937;
            color: white;
            border: none;
            padding: 12px 20px;
            width: 100%;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
        }
        button:hover {

        .danger-btn {

        .danger-btn:hover {

        }
        .back-btn {

            margin-bottom: 20px;

        .error-msg {
            background: #fee2e2;

        .success-msg {
            background: #dcfce7;
            color: #15803d;
            padding: 10px;
            border-radius: 60px;
            margin-top: 12px;
            text-align: center;
        }
        .warning-banner {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 20px;
            font-size: 0.75rem;
            color: #92400e;
        }
        body.dark .warning-banner {
            background: #4a3a2a;
            color: #fde047;
        }

        /* Баланс */
        .balance {
            background: #f1f5f9;
            padding: 16px 20px;
            border-radius: 24px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        body.dark .balance {
            background: #334155;
        }
        .balance-amount {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1f2937;
        }
        body.dark .balance-amount {
            color: #fbbf24;
        }

        /* История */
        .history-item {
            background: #f8fafc;
            padding: 10px 14px;
            border-radius: 16px;
            margin-bottom: 8px;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
        }
        body.dark .history-item {
            background: #334155;
        }
        .history-in { color: #10b981; }
        .history-out { color: #ef4444; }
        .transaction-list {
            max-height: 180px;
            overflow-y: auto;

        }

        /* Ссылка */
        .link-box {
            background: #f1f5f9;
            border-radius: 16px;
            padding: 12px;
            margin: 12px 0;
        }
        body.dark .link-box {

        }
        textarea {
            width: 100%;
            padding: 10px;
            font-family: monospace;
            font-size: 0.7rem;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: white;
        }
        body.dark textarea {
            background: #1e293b;
            border-color: #475569;

        }

        .flex-buttons {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        .settings-btn { background: #8b5cf6; }
        .logout-btn { background: #475569; }
        .legal-footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.7rem;
        }
        .legal-footer a {
            color: #667eea;
            cursor: pointer;

            margin: 0 8px;
        }
        .no-card-message {
            text-align: center;
            padding: 40px 20px;
            background: #f1f5f9;
            border-radius: 24px;
            margin-bottom: 20px;
        }
        body.dark .no-card-message {
            background: #334155;
        }
        .create-card-btn {
            background: #f59e0b;
            margin-top: 16px;
        }
        .card-type-option {
            background: linear-gradient(135deg, #1E2A3E, #0F1722);
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            color: white;
        }
        .card-type-option.selected {
            border-color: #fbbf24;
        }
        .card-type-name {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }
        .switch-mode {
            text-align: center;
            margin-top: 16px;
        }
        .switch-mode a {
            color: #667eea;
            cursor: pointer;
        }
        .privacy-badge {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 16px;
            color: #64748b;
        }
        .ncp-tag {
            font-size: 0.6rem;
            text-align: center;
            margin-top: 16px;
            color: rgba(255,255,255,0.5);
        }
        h2 { font-size: 1.4rem; margin-bottom: 16px; }
        .welcome-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .user-greeting {
            background: #eef2ff;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
        }
        body.dark .user-greeting {
            background: #3b82f6;
            color: white;
        }
        .card-click-hint {
            text-align: center;
            font-size: 0.65rem;
            margin-top: -15px;
            margin-bottom: 15px;
            opacity: 0.7;
        }
        .theme-toggle {
            width: 50px;
            height: 26px;
            background: #cbd5e1;
            border-radius: 30px;
            position: relative;
            cursor: pointer;
        }
        body.dark .theme-toggle { background: #3b82f6; }
        .theme-toggle:after {
            content: "☀️";
            position: absolute;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: 0.2s;
        }
        body.dark .theme-toggle:after {
            content: "🌙";
            left: 25px;
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        body.dark .setting-item {
            border-bottom-color: #475569;
        }
        .currency-select {
            padding: 6px 12px;
            border-radius: 30px;
        }
        .task-card {
            background: #fef9e3;
            border-left: 4px solid #f59e0b;
            padding: 14px;
            border-radius: 20px;
            margin: 20px 0;
        }
        body.dark .task-card {
            background: #4a3a2a;
        }
        .btn-task {
            background: #f59e0b;
            margin-top: 10px;
        }
        .transfer-section {
            background: #eef2ff;
            padding: 16px;
            border-radius: 24px;
            margin: 20px 0;
        }
        body.dark .transfer-section {
            background: #1e293b;
        }
        .transfer-title {
            font-weight: bold;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="ncp-logo">
        <h1>🏦 NCPBANK</h1>
        <p>Анонимный мемный кошелек</p>
    </div>
    <div id="appRoot"></div>
    <div class="ncp-tag">⚡ Решения принимаются здесь. Где здесь — неизвестно.</div>
</div>

<script>
    // ========== КЛЮЧИ ==========
    const USERS_KEY = 'ncpbank_v5';
    const SESSION_KEY = 'ncpbank_session_v5';
    const CURRENT_USER_KEY = 'ncpbank_current_v5';
    const SETTINGS_KEY = 'ncpbank_settings_v5';
    const AGREEMENT_KEY = 'ncpbank_agreement_v5';
    const FORBIDDEN_CACHE_KEY = 'ncpbank_forbidden_v5';

    // ========== ЗАГРУЗКА ЗАПРЕЩЁННЫХ ИМЁН ==========
    let FORBIDDEN_NAMES = [];

    async function loadForbiddenNames() {
        const cached = localStorage.getItem(FORBIDDEN_CACHE_KEY);
        if (cached) {
            try {
                FORBIDDEN_NAMES = JSON.parse(cached);
                console.log(`✅ Загружено ${FORBIDDEN_NAMES.length} имён из кэша`);
                return;
            } catch(e) {}
        }
        try {
            const response = await fetch('blkne.txt');
            if (!response.ok) throw new Error('Файл не найден');
            const text = await response.text();
            const lines = text.split('\n');
            FORBIDDEN_NAMES = [];
            for (const line of lines) {
                const trimmed = line.trim().toLowerCase();
                if (trimmed && !trimmed.startsWith('#')) {
                    FORBIDDEN_NAMES.push(trimmed);
                }
            }
            localStorage.setItem(FORBIDDEN_CACHE_KEY, JSON.stringify(FORBIDDEN_NAMES));
            console.log(`✅ Загружено ${FORBIDDEN_NAMES.length} имён из blkne.txt`);
        } catch(e) {
            console.error('Ошибка загрузки blkne.txt:', e);
            FORBIDDEN_NAMES = ['александр', 'алексей', 'дмитрий', 'сергей', 'андрей', 'владимир', 'николай', 'михаил', 'евгений', 'иван', 'анастасия', 'мария', 'екатерина', 'анна', 'елена'];
        }
    }

    function isRealName(nickname) {
        const lower = nickname.toLowerCase().trim();
        if (lower.length < 3) return false;
        for (const forbidden of FORBIDDEN_NAMES) {
            if (lower === forbidden || lower.includes(forbidden)) return true;
        }
        const russianPattern = /^[А-ЯЁ][а-яё]{2,19}$/;
        const englishPattern = /^[A-Z][a-z]{2,19}$/;
        if (russianPattern.test(nickname) || englishPattern.test(nickname)) {
            if (/^[A-Za-zА-Яа-я]+$/.test(nickname) && nickname.length <= 15) return true;
        }
        return false;
    }

    // ========== НАСТРОЙКИ ==========
    let appSettings = { theme: 'light', currency: 'KACKOIN' };
    function loadSettings() {
        const saved = localStorage.getItem(SETTINGS_KEY);
        if (saved) {
            try { appSettings = JSON.parse(saved); applyTheme(); } catch(e) {}
        }
    }
    function saveSettings() { localStorage.setItem(SETTINGS_KEY, JSON.stringify(appSettings)); applyTheme(); }
    function applyTheme() {
        if (appSettings.theme === 'dark') document.body.classList.add('dark');
        else document.body.classList.remove('dark');
    }
    function getCurrencySymbol() {
        if (appSettings.currency === 'KACKOIN') return '-_-';
        const symbols = { 'RUB': '₽', 'USD': '$', 'EUR': '€', 'GBP': '£' };
        return symbols[appSettings.currency] || '-_-';
    }
    function getCurrencyName() {
        if (appSettings.currency === 'KACKOIN') return 'KC-KacKoin';
        const names = { 'RUB': 'Рубль', 'USD': 'Доллар', 'EUR': 'Евро', 'GBP': 'Фунт' };
        return names[appSettings.currency] || 'KC-KacKoin';
    }

    function isAgreementAccepted() { return localStorage.getItem(AGREEMENT_KEY) === 'true'; }
    function acceptAgreement() { localStorage.setItem(AGREEMENT_KEY, 'true'); }

    // ========== ПОЛЬЗОВАТЕЛИ ==========
    async function hashPassword(pwd) {
        const encoder = new TextEncoder();
        const data = encoder.encode(pwd);
        const hash = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    function loadUsers() {
        const stored = localStorage.getItem(USERS_KEY);
        return stored ? JSON.parse(stored) : {};
    }
    function saveUsers(users) { localStorage.setItem(USERS_KEY, JSON.stringify(users)); }
    function saveSession(nickname) {
        localStorage.setItem(SESSION_KEY, JSON.stringify({ nickname, timestamp: Date.now() }));
        localStorage.setItem(CURRENT_USER_KEY, nickname);
    }
    function loadSession() {
        const raw = localStorage.getItem(SESSION_KEY);
        if (!raw) return null;
        try {
            const data = JSON.parse(raw);
            if (data.nickname && (Date.now() - data.timestamp) < 86400000) {
                const users = loadUsers();
                if (users[data.nickname]) return data.nickname;
            }
            localStorage.removeItem(SESSION_KEY);
            return null;
        } catch(e) { return null; }
    }
    function logout() {
        localStorage.removeItem(SESSION_KEY);
        localStorage.removeItem(CURRENT_USER_KEY);
        showCardDetail = false; showCreateCard = false; showLegal = false;
        renderApp();
    }
    function resetAllData() {
        if (confirm('⚠️ Удалить ВСЕ данные?')) {
            localStorage.clear();
            appSettings = { theme: 'light', currency: 'KACKOIN' };
            saveSettings();
            currentView = 'login';
            showSettings = false; showCardDetail = false; showCreateCard = false; showLegal = false;
            loadForbiddenNames();
            renderApp();
            alert('✅ Все данные сброшены!');
        }
    }

    async function registerUser(nickname, password) {
        const users = loadUsers();
        if (!nickname.trim()) return { success: false, error: 'Введите ник' };
        if (nickname.length < 3) return { success: false, error: 'Ник минимум 3 символа' };
        if (nickname.length > 20) return { success: false, error: 'Ник максимум 20 символов' };
        if (!password) return { success: false, error: 'Введите пароль' };
        if (password.length < 3) return { success: false, error: 'Пароль минимум 3 символа' };
        if (isRealName(nickname)) return { success: false, error: '❌ Используйте вымышленный ник! Реальные имена запрещены.' };
        if (users[nickname]) return { success: false, error: 'Ник уже занят' };
        
        users[nickname] = {
            nickname: nickname.trim(),
            passwordHash: await hashPassword(password),
            balance: 0,
            completedTasks: { visitNcp: false },
            hasCard: false,
            cardData: null,
            createdAt: new Date().toISOString(),
            transactions: []
        };
        saveUsers(users);
        saveSession(nickname);
        return { success: true };
    }

    async function loginUser(nickname, password) {
        const users = loadUsers();
        const user = users[nickname];
        if (!user) return { success: false, error: 'Пользователь не найден' };
        if (user.passwordHash !== await hashPassword(password)) return { success: false, error: 'Неверный пароль' };
        saveSession(nickname);
        return { success: true };
    }

    function getUserData() {
        const nickname = loadSession();
        if (!nickname) return null;
        return loadUsers()[nickname] || null;
    }
    function updateUserData(data) {
        const nickname = loadSession();
        if (!nickname) return false;
        const users = loadUsers();
        if (users[nickname]) {
            users[nickname] = { ...users[nickname], ...data };
            saveUsers(users);
            return true;
        }
        return false;
    }

    function createUserCard(cardTypeId, cardNumber, cvv) {
        const nickname = loadSession();
        if (!nickname) return { success: false, error: 'Ошибка' };
        const users = loadUsers();
        const user = users[nickname];
        const cardType = CARD_TYPES.find(c => c.id === cardTypeId);
        if (!cardType) return { success: false, error: 'Неверный тип' };
        user.hasCard = true;
        user.cardData = {
            typeId: cardTypeId, typeName: cardType.name, icons: cardType.icons,
            emoji: cardType.emoji, cardNumber, cvv, expiry: '08/28', createdAt: new Date().toISOString()
        };
        saveUsers(users);
        return { success: true };
    }

    // ========== ПЕРЕВОДЫ ==========
    function generateContractNumber() {
        return `NCP-${new Date().getFullYear()}${String(new Date().getMonth()+1).padStart(2,'0')}-${Math.floor(Math.random()*10000).toString().padStart(4,'0')}`;
    }
    function createTransferLink(amount, note) {
        const user = getUserData();
        if (!user) return null;
        if (user.balance < amount) return { error: `Недостаточно ${getCurrencyName()}` };
        const contract = generateContractNumber();
        const link = `${location.origin}${location.pathname}#transfer/${encodeURIComponent(user.nickname)}/${encodeURIComponent(contract)}/${amount}/${encodeURIComponent(note || '')}`;
        return { link, contractNumber: contract, note: note || '' };
    }
    function parseTransferLink(hash) {
        const parts = hash.split('/');
        if (parts[0] === '#transfer' && parts.length >= 5) {
            return { fromNick: decodeURIComponent(parts[1]), contractNumber: decodeURIComponent(parts[2]), amount: parseFloat(parts[3]), note: decodeURIComponent(parts[4]) };
        }
        return null;
    }
    function executeTransfer(fromNick, amount, contract, note) {
        const current = getUserData();
        if (!current) return { success: false, error: 'Ошибка' };
        if (fromNick === current.nickname) return { success: false, error: 'Нельзя себе' };
        const users = loadUsers();
        const fromUser = users[fromNick];
        if (!fromUser) return { success: false, error: 'Отправитель не найден' };
        if (fromUser.balance < amount) return { success: false, error: 'Недостаточно средств' };
        const txFrom = { id: Date.now(), type: 'out', to: current.nickname, amount, date: new Date().toLocaleString(), method: 'link', contractNumber: contract, note };
        const txTo = { id: Date.now(), type: 'in', from: fromUser.nickname, amount, date: new Date().toLocaleString(), method: 'link', contractNumber: contract, note };
        users[fromUser.nickname] = { ...fromUser, balance: fromUser.balance - amount, transactions: [txFrom, ...(fromUser.transactions || [])].slice(0,50) };
        users[current.nickname] = { ...current, balance: current.balance + amount, transactions: [txTo, ...(current.transactions || [])].slice(0,50) };
        saveUsers(users);
        return { success: true, amount, from: fromUser.nickname, contract };
    }

    function completeTask() {
        const user = getUserData();
        if (!user || user.completedTasks.visitNcp) return false;
        window.open('https://ncpbank.vercel.app/', '_blank');
        updateUserData({ balance: user.balance + 10, completedTasks: { visitNcp: true } });
        renderApp();
        return true;
    }
    function randomBonus() {
        const user = getUserData();
        if (!user) return;
        const delta = Math.floor(Math.random() * 600) - 100;
        updateUserData({ balance: Math.max(0, user.balance + delta) });
        renderApp();
    }
    function formatCardNumber(num) {
        if (!num) return '**** **** **** ****';
        const parts = num.split(' ');
        return parts.length === 4 ? `${parts[0]} **** **** ${parts[3]}` : num;
    }
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
    }

    const CARD_TYPES = [
        { id: 'tooth', name: 'Зубодробительная', icons: '🦷💥🔨🩸', emoji: '🦷' },
        { id: 'neuro', name: 'Нейрогоьная', icons: '🧠⚡💀🌀', emoji: '🧠' },
        { id: 'black', name: 'NCP-BLACK', icons: '🖤🔪⬛🌑', emoji: '🖤' },
        { id: 'solver', name: 'Решатель 3000', icons: '🤖⚙️🔧💡', emoji: '🤖' },
        { id: 'crypto', name: 'Крипто-Колбаса', icons: '🌭📈🚀🌭', emoji: '🌭' },
        { id: 'buro', name: 'Бюрократ Х2', icons: '📋📋🖊️📄', emoji: '📋' }
    ];

    let currentView = 'login';
    let showSettings = false, showCardDetail = false, showCreateCard = false, showLegal = false;
    let legalMode = 'offer';
    let selectedCardType = CARD_TYPES[0].id;
    let currentLink = null, currentContract = null, currentNote = '';
    let showAgreementModal = false;

    // ========== UI ==========
    function getWarningBanner() {
        return `<div class="warning-banner">⚠️ ДЕМО-РЕЖИМ | Пароли в SHA-256 | Реальные имена запрещены | Загружено ${FORBIDDEN_NAMES.length} запрещённых имён</div>`;
    }

    function renderAgreementModal() {
        return `<div class="modal-overlay"><div class="modal-content"><h2>📜 Добро пожаловать в NCPBANK!</h2><p>Ознакомьтесь с условиями:</p><div class="legal-scroll"><h3>📜 Пользовательское соглашение</h3><p>1. NCPBANK — развлекательный мем-проект, не финансовое учреждение. Валюта KC-KacKoin (-_-) не имеет реальной ценности.</p><p>2. Регистрация только с анонимным ником. Реальные имена запрещены.</p><p>3. Пароли хранятся в виде хеша SHA-256.</p><p>4. Все переводы — игровая механика. Вывод в реальные деньги невозможен.</p><p>5. Сервис для лиц 18+. Используя, вы подтверждаете совершеннолетие.</p><h3>🔒 Политика конфиденциальности</h3><p>• Собирается только ник и хеш пароля</p><p>• Данные хранятся в вашем браузере (localStorage)</p><p>• Данные не передаются третьим лицам</p><p>• Вы можете удалить все данные кнопкой «Сбросить»</p><p>• Контакты: support@ncpbank.vercel.app</p></div><div class="modal-actions"><button id="declineAgreementBtn" class="decline-btn">❌ Отказаться</button><button id="acceptAgreementBtn" class="accept-btn">✅ Принимаю</button></div></div></div>`;
    }

    function renderLoginScreen() {
        return `<div class="login-card">${getWarningBanner()}<form id="loginForm"><div class="input-group"><label>👤 Ник</label><input type="text" id="loginNickname" placeholder="Ваш ник" maxlength="20"></div><div class="input-group"><label>🔒 Пароль</label><input type="password" id="loginPassword" placeholder="Пароль"></div><button type="submit">Войти →</button></form><div class="switch-mode"><a id="switchToRegister">📝 Регистрация</a></div><button id="resetAllDataBtn" class="danger-btn">🗑️ Сбросить данные</button><div class="legal-footer"><a id="showOfferBtn">📜 Соглашение</a> | <a id="showPrivacyBtn">🔒 Политика</a></div></div>`;
    }

    function renderRegisterScreen() {
        return `<div class="register-card">${getWarningBanner()}<form id="registerForm"><div class="input-group"><label>👤 Ник (от 3 до 20, не реальное имя!)</label><input type="text" id="regNickname" placeholder="Придумайте ник" maxlength="20"></div><div class="input-group"><label>🔒 Пароль (мин. 3 символа)</label><input type="password" id="regPassword" placeholder="Пароль"></div><button type="submit">Создать аккаунт →</button></form><div class="switch-mode"><a id="switchToLogin">🔙 Уже есть аккаунт?</a></div><button id="resetAllDataBtn" class="danger-btn">🗑️ Сбросить данные</button><div class="legal-footer"><a id="showOfferBtn">📜 Соглашение</a> | <a id="showPrivacyBtn">🔒 Политика</a></div></div>`;
    }

    function renderSettings() {
        return `<div class="settings-panel"><div style="display:flex; justify-content:space-between; margin-bottom:20px;"><h2>⚙️ Настройки</h2><button id="closeSettingsBtn" class="back-btn" style="width:auto;">←</button></div><div class="setting-item"><span>🌙 Тёмная тема</span><div class="theme-toggle" id="themeToggle"></div></div><div class="setting-item"><span>💱 Валюта (${getCurrencyName()} ${getCurrencySymbol()})</span><select id="currencySelect" class="currency-select"><option value="KACKOIN" ${appSettings.currency === 'KACKOIN' ? 'selected' : ''}>KC-KacKoin (-_-)</option><option value="RUB" ${appSettings.currency === 'RUB' ? 'selected' : ''}>Рубль (₽)</option><option value="USD" ${appSettings.currency === 'USD' ? 'selected' : ''}>Доллар ($)</option><option value="EUR" ${appSettings.currency === 'EUR' ? 'selected' : ''}>Евро (€)</option></select></div><div class="legal-footer" style="margin-top:20px;"><a id="showOfferBtn">📜 Соглашение</a> | <a id="showPrivacyBtn">🔒 Политика</a></div></div>`;
    }

    function renderDashboard() {
        const user = getUserData();
        if (!user) { logout(); return renderLoginScreen(); }
        if (showSettings) return renderSettings();
        if (showCardDetail) return renderCardDetailPage();
        if (showCreateCard) return renderCreateCardPage();
        if (showLegal) return legalMode === 'offer' ? renderOfferPage() : renderPrivacyPage();

        const symbol = getCurrencySymbol();
        const balanceFormatted = user.balance.toLocaleString('ru-RU', { minimumFractionDigits: 2 });
        const history = user.transactions || [];
        
        if (!user.hasCard) {
            return `<div class="dashboard-card"><div class="welcome-header"><h2>🏦 Привет, ${escapeHtml(user.nickname)}</h2><div class="user-greeting">⚡ NCP</div></div><div class="no-card-message"><span style="font-size:48px;">💳</span><p>У вас ещё нет карты</p><button id="createCardBtn" class="create-card-btn">✨ Создать карту</button></div><div class="balance"><span>💰 Баланс</span><span class="balance-amount">${balanceFormatted} ${symbol}</span></div><div class="task-card"><div class="task-title">📢 Задание</div><p>🔗 Зайди на ncpbank.vercel.app и получи +10 ${symbol}</p><button id="doVisitNcpBtn" class="btn-task">Выполнить →</button></div><hr><div class="flex-buttons"><button id="randomBonusBtn" style="background:#3b82f6;">🎲 Бонус</button><button id="settingsBtn" class="settings-btn">⚙️</button><button id="logoutBtn" class="logout-btn">🚪</button></div><div class="legal-footer"><a id="showOfferBtn">📜 Соглашение</a> | <a id="showPrivacyBtn">🔒 Политика</a></div><div class="privacy-badge">🔐 Пароль в SHA-256 | Реальные имена запрещены</div></div>`;
        }
        
        const card = user.cardData;
        const historyHtml = history.length === 0 ? '<div style="text-align:center;padding:16px;">Нет переводов</div>' :
            history.map(t => `<div class="history-item"><span>${t.type === 'in' ? '📥 От ' + escapeHtml(t.from) : '📤 Кому ' + escapeHtml(t.to)} ${t.contractNumber ? `(${t.contractNumber})` : ''} ${t.note ? `📝 ${escapeHtml(t.note)}` : ''}</span><span class="${t.type === 'in' ? 'history-in' : 'history-out'}">${t.type === 'in' ? '+' : '-'} ${t.amount.toFixed(2)} ${symbol}</span></div>`).join('');
        
        let linkHtml = '';
        if (currentLink) {
            linkHtml = `<div class="link-box"><div style="font-size:0.7rem;">📄 Договор: ${currentContract}</div>${currentNote ? `<div style="font-size:0.7rem;">📝 ${escapeHtml(currentNote)}</div>` : ''}<textarea rows="2" readonly id="transferLink">${currentLink}</textarea><button id="copyLinkBtn" class="copy-btn">📋 Копировать ссылку</button><button id="clearLinkBtn" style="background:#6b7280;">Очистить</button></div>`;
        }
        
        return `<div class="dashboard-card"><div class="welcome-header"><h2>🏦 Привет, ${escapeHtml(user.nickname)}</h2><div class="user-greeting">⚡ ${card.typeName}</div></div>
        <div id="clickableCard" class="bank-card"><div class="card-chip"><div class="chip-icon"></div><div class="card-network">NCP</div></div><div class="card-number">${formatCardNumber(card.cardNumber)}</div><div class="card-details"><div class="card-holder"><span>Card Holder</span><p>${escapeHtml(user.nickname.toUpperCase())}</p></div><div class="card-expiry"><span>Expires</span><p>${card.expiry}</p></div></div></div>
        <div class="card-click-hint">👆 Нажмите на карту для деталей</div>
        <div class="balance"><span>💰 Баланс</span><span class="balance-amount">${balanceFormatted} ${symbol}</span></div>
        <div class="transfer-section"><div class="transfer-title">🔗 Перевод по ссылке</div>
        <div class="input-group"><label>💰 Сумма (${symbol})</label><input type="number" id="transferAmount" step="0.01" placeholder="Сумма"></div>
        <div class="input-group"><label>📝 Комментарий</label><input type="text" id="transferNote" placeholder="Например: За обед"></div>
        <button id="createLinkBtn">✨ Создать ссылку</button>${linkHtml}</div>
        <div><div style="font-weight:600;">📜 История</div><div class="transaction-list">${historyHtml}</div></div>
        <div class="task-card"><div class="task-title">📢 Задание</div><p>🔗 Зайди на ncpbank.vercel.app и получи +10 ${symbol}</p><button id="doVisitNcpBtn" class="btn-task">Выполнить →</button></div>
        <hr><div class="flex-buttons"><button id="randomBonusBtn" style="background:#3b82f6;">🎲 Бонус</button><button id="settingsBtn" class="settings-btn">⚙️</button><button id="logoutBtn" class="logout-btn">🚪</button></div>
        <div class="legal-footer"><a id="showOfferBtn">📜 Соглашение</a> | <a id="showPrivacyBtn">🔒 Политика</a></div>
        <div class="privacy-badge">🔐 Пароль в SHA-256 | Реальные имена запрещены</div></div>`;
    }

    function renderCreateCardPage() {
        return `<div class="create-card-page"><button id="backFromCreateBtn" class="back-btn">← Назад</button><h2>💳 Создание карты</h2><div style="margin-bottom:16px;"><label>🎨 Тип карты</label><div id="cardTypesList">${CARD_TYPES.map(c => `<div class="card-type-option ${selectedCardType === c.id ? 'selected' : ''}" data-card-id="${c.id}"><div class="card-type-name"><span>${c.emoji} ${c.name}</span><span>${c.icons}</span></div></div>`).join('')}</div></div><div class="input-group"><label>🔢 Номер карты (16 цифр)</label><input type="text" id="cardNumberInput" placeholder="4532 1234 5678 9012" maxlength="19"></div><div class="input-group"><label>🔐 CVV (3 цифры)</label><input type="text" id="cvvInput" placeholder="123" maxlength="3"></div><button id="confirmCreateCardBtn" style="background:#10b981;">✨ Создать</button><div id="createCardMsg"></div></div>`;
    }
    function renderCardDetailPage() {
        const user = getUserData();
        if (!user?.cardData) { showCardDetail = false; return renderDashboard(); }
        const card = user.cardData;
        return `<div class="card-detail-page"><button id="backFromCardBtn" class="back-btn">← Назад</button><h2>💳 Детали карты</h2><div class="bank-card" style="cursor:default;"><div class="card-chip"><div class="chip-icon"></div><div class="card-network">NCP</div></div><div class="card-number">${card.cardNumber}</div><div class="card-details"><div class="card-holder"><span>Card Holder</span><p>${escapeHtml(user.nickname.toUpperCase())}</p></div><div class="card-expiry"><span>Expires</span><p>${card.expiry}</p></div></div></div><div class="info-row"><span>🎨 Тип</span><span>${card.emoji} ${card.typeName}</span></div><div class="info-row"><span>🔐 CVV</span><span>${card.cvv}</span></div><div class="demo-hint">💡 Храните CVV в секрете!</div></div>`;
    }
    function renderOfferPage() {
        return `<div class="legal-page"><button id="backFromLegalBtn" class="back-btn">← Назад</button><h2>📜 Пользовательское соглашение</h2><div class="legal-scroll" style="max-height:400px;"><p><strong>Версия 1.0</strong></p><p>1. NCPBANK — развлекательный мем-проект. Валюта KC-KacKoin (-_-) не имеет реальной ценности.</p><p>2. Регистрация только с анонимным ником. Реальные имена запрещены.</p><p>3. Пароли хранятся в виде хеша SHA-256.</p><p>4. Все переводы — игровая механика. Вывод в реальные деньги невозможен.</p><p>5. Сервис для лиц 18+.</p><p>6. Вы можете удалить данные кнопкой «Сбросить».</p><p>7. Контакты: support@ncpbank.vercel.app</p></div></div>`;
    }
    function renderPrivacyPage() {
        return `<div class="legal-page"><button id="backFromLegalBtn" class="back-btn">← Назад</button><h2>🔒 Политика конфиденциальности</h2><div class="legal-scroll"><p><strong>Какие данные собираются?</strong> Только ник и хеш пароля.</p><p><strong>Где хранятся?</strong> В localStorage вашего браузера.</p><p><strong>Передаются ли третьим лицам?</strong> Нет.</p><p><strong>Как удалить?</strong> Кнопка «Сбросить данные».</p><p><strong>Контакты:</strong> support@ncpbank.vercel.app</p></div></div>`;
    }

    // ========== ОБРАБОТЧИКИ ==========
    function attachLoginHandlers() {
        document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!isAgreementAccepted()) { showAgreementModal = true; renderApp(); return; }
            const res = await loginUser(document.getElementById('loginNickname').value.trim(), document.getElementById('loginPassword').value);
            if (res.success) { showSettings = false; showCardDetail = false; showCreateCard = false; renderApp(); }
            else { let err = document.getElementById('loginErrorMsg'); if (!err) { err = document.createElement('div'); err.id = 'loginErrorMsg'; err.className = 'error-msg'; e.target.appendChild(err); } err.textContent = '❌ ' + res.error; }
        });
        document.getElementById('switchToRegister')?.addEventListener('click', () => { currentView = 'register'; renderApp(); });
        document.getElementById('resetAllDataBtn')?.addEventListener('click', resetAllData);
        document.getElementById('showOfferBtn')?.addEventListener('click', () => { showLegal = true; legalMode = 'offer'; renderApp(); });
        document.getElementById('showPrivacyBtn')?.addEventListener('click', () => { showLegal = true; legalMode = 'privacy'; renderApp(); });
    }
    function attachRegisterHandlers() {
        document.getElementById('registerForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!isAgreementAccepted()) { showAgreementModal = true; renderApp(); return; }
            const res = await registerUser(document.getElementById('regNickname').value.trim(), document.getElementById('regPassword').value);
            if (res.success) { showCreateCard = true; renderApp(); }
            else { let err = document.getElementById('regErrorMsg'); if (!err) { err = document.createElement('div'); err.id = 'regErrorMsg'; err.className = 'error-msg'; e.target.appendChild(err); } err.textContent = '❌ ' + res.error; }
        });
        document.getElementById('switchToLogin')?.addEventListener('click', () => { currentView = 'login'; renderApp(); });
        document.getElementById('resetAllDataBtn')?.addEventListener('click', resetAllData);
        document.getElementById('showOfferBtn')?.addEventListener('click', () => { showLegal = true; legalMode = 'offer'; renderApp(); });
        document.getElementById('showPrivacyBtn')?.addEventListener('click', () => { showLegal = true; legalMode = 'privacy'; renderApp(); });
    }
    function attachDashboardHandlers() {
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        document.getElementById('randomBonusBtn')?.addEventListener('click', randomBonus);
        document.getElementById('doVisitNcpBtn')?.addEventListener('click', completeTask);
        document.getElementById('settingsBtn')?.addEventListener('click', () => { showSettings = true; renderApp(); });
        document.getElementById('clickableCard')?.addEventListener('click', () => { showCardDetail = true; renderApp(); });
        document.getElementById('createCardBtn')?.addEventListener('click', () => { showCreateCard = true; renderApp(); });
        document.getElementById('showOfferBtn')?.addEventListener('click', () => { showLegal = true; legalMode = 'offer'; renderApp(); });
        document.getElementById('showPrivacyBtn')?.addEventListener('click', () => { showLegal = true; legalMode = 'privacy'; renderApp(); });
        
        document.getElementById('createLinkBtn')?.addEventListener('click', () => {
            const amount = parseFloat(document.getElementById('transferAmount')?.value);
            const note = document.getElementById('transferNote')?.value || '';
            if (!amount || amount <= 0) { alert('Введите сумму'); return; }
            const user = getUserData();
            if (user.balance < amount) { alert(`Недостаточно ${getCurrencyName()}`); return; }
            const res = createTransferLink(amount, note);
            if (res.error) alert(res.error);
            else { currentLink = res.link; currentContract = res.contractNumber; currentNote = res.note; renderApp(); }
        });
        document.getElementById('clearLinkBtn')?.addEventListener('click', () => { currentLink = null; currentContract = null; currentNote = ''; renderApp(); });
        document.getElementById('copyLinkBtn')?.addEventListener('click', () => {
            const ta = document.getElementById('transferLink');
            if (ta) { ta.select(); document.execCommand('copy'); alert('✅ Ссылка скопирована!'); }
        });
        
        if (location.hash && location.hash.startsWith('#transfer/')) {
            const parsed = parseTransferLink(location.hash);
            if (parsed) {
                const cur = getUserData();
                if (!cur) alert('❌ Войдите в аккаунт');
                else if (parsed.fromNick === cur.nickname) alert('❌ Нельзя себе');
                else if (confirm(`📥 Получить ${parsed.amount} ${getCurrencySymbol()} от ${parsed.fromNick}? ${parsed.note ? `\n📝 ${parsed.note}` : ''}`)) {
                    const res = executeTransfer(parsed.fromNick, parsed.amount, parsed.contractNumber, parsed.note);
                    alert(res.success ? `✅ Получено ${res.amount} ${getCurrencySymbol()} от ${res.from}` : `❌ ${res.error}`);
                    location.hash = '';
                    renderApp();
                } else location.hash = '';
            }
        }
    }
    function attachCreateCardHandlers() {
        document.getElementById('backFromCreateBtn')?.addEventListener('click', () => { showCreateCard = false; renderApp(); });
        document.querySelectorAll('.card-type-option').forEach(el => {
            el.addEventListener('click', () => { selectedCardType = el.dataset.cardId; renderApp(); });
        });
        document.getElementById('confirmCreateCardBtn')?.addEventListener('click', () => {
            const number = document.getElementById('cardNumberInput').value.trim();
            const cvv = document.getElementById('cvvInput').value.trim();
            const msg = document.getElementById('createCardMsg');
            const cleanNum = number.replace(/\s/g, '');
            if (!cleanNum || cleanNum.length !== 16 || !/^\d+$/.test(cleanNum)) { msg.innerHTML = '<div class="error-msg">❌ 16 цифр номера</div>'; return; }
            if (!cvv || cvv.length !== 3 || !/^\d+$/.test(cvv)) { msg.innerHTML = '<div class="error-msg">❌ 3 цифры CVV</div>'; return; }
            const formatted = cleanNum.replace(/(\d{4})(?=\d)/g, '$1 ');
            const res = createUserCard(selectedCardType, formatted, cvv);
            if (res.success) { msg.innerHTML = '<div class="success-msg">✅ Карта создана!</div>'; setTimeout(() => { showCreateCard = false; renderApp(); }, 1000); }
            else msg.innerHTML = `<div class="error-msg">❌ ${res.error}</div>`;
        });
    }
    function attachCardDetailHandlers() {
        document.getElementById('backFromCardBtn')?.addEventListener('click', () => { showCardDetail = false; renderApp(); });
    }
    function attachSettingsHandlers() {
        document.getElementById('closeSettingsBtn')?.addEventListener('click', () => { showSettings = false; renderApp(); });
        document.getElementById('themeToggle')?.addEventListener('click', () => { appSettings.theme = appSettings.theme === 'light' ? 'dark' : 'light'; saveSettings(); renderApp(); });
        document.getElementById('currencySelect')?.addEventListener('change', (e) => { appSettings.currency = e.target.value; saveSettings(); renderApp(); });
        document.getElementById('showOfferBtn')?.addEventListener('click', () => { showLegal = true; legalMode = 'offer'; renderApp(); });
        document.getElementById('showPrivacyBtn')?.addEventListener('click', () => { showLegal = true; legalMode = 'privacy'; renderApp(); });
    }
    function attachLegalHandlers() {
        document.getElementById('backFromLegalBtn')?.addEventListener('click', () => { showLegal = false; renderApp(); });
    }
    function attachAgreementModalHandlers() {
        document.getElementById('acceptAgreementBtn')?.addEventListener('click', () => { acceptAgreement(); showAgreementModal = false; renderApp(); });
        document.getElementById('declineAgreementBtn')?.addEventListener('click', () => alert('❌ Без принятия условий использовать NCPBANK нельзя.'));
    }

    function renderApp() {
        const root = document.getElementById('appRoot');
        if (!root) return;
        if (!isAgreementAccepted() && showAgreementModal) {
            root.innerHTML = renderAgreementModal();
            attachAgreementModalHandlers();
            return;
        }
        const session = loadSession();
        if (session) {
            root.innerHTML = renderDashboard();
            if (showSettings) attachSettingsHandlers();
            else if (showCardDetail) attachCardDetailHandlers();
            else if (showCreateCard) attachCreateCardHandlers();
            else if (showLegal) attachLegalHandlers();
            else attachDashboardHandlers();
        } else {
            root.innerHTML = (currentView === 'register') ? renderRegisterScreen() : renderLoginScreen();
            if (currentView === 'register') attachRegisterHandlers();
            else attachLoginHandlers();
        }
    }

    async function init() {
        loadSettings();
        await loadForbiddenNames();
        if (!isAgreementAccepted()) showAgreementModal = true;
        renderApp();
        window.addEventListener('storage', () => renderApp());
    }
    init();
</script>
